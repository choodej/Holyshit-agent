name: CI

"on":
  pull_request:
  push:

jobs:
  sandbox:
    name: Sandbox tests and graph guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sandbox

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Run strict graph check
        run: python tools/graphify.py --strict

      - name: Ensure generated graph artifacts are committed
        run: git diff --exit-code CATALOG.md graph.json graph.mmd
